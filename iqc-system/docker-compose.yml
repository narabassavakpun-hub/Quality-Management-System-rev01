# ============================================================================
# IQC System — Production docker-compose
#   app   = Node (Express + SQLite + Chromium singleton) เสิร์ฟ API + SPA + uploads
#   nginx = reverse proxy (TLS / SSE / body size / gzip)
#
# เริ่มใช้งาน:  cp .env.production.example .env.production  (แก้ค่าให้ครบ) แล้ว
#              docker compose up -d --build
# ============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: iqc-system:latest
    container_name: iqc-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      # ค่าที่บังคับให้ถูกเสมอ (override .env ถ้าเผลอตั้งผิด)
      NODE_ENV: production
      PORT: "3001"
      TZ: Asia/Bangkok
      IQC_DB_PATH: /data/iqc.db
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    volumes:
      - iqc_uploads:/app/uploads      # ไฟล์แนบ — ต้อง survive restart
      - iqc_data:/data                # SQLite + WAL — ห้ามอยู่บน ephemeral storage
    shm_size: "512mb"                 # กัน Chromium /dev/shm เต็ม (เสริมจาก --disable-dev-shm-usage)
    expose:
      - "3001"                        # ภายใน network เท่านั้น (ไม่ publish ออกตรงๆ)
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    # จำกัด RAM กัน memory leak ลามทั้งเครื่อง (ปรับตาม VPS) — Chromium กินเยอะตอน export
    deploy:
      resources:
        limits:
          memory: 1024m
    stop_grace_period: 20s            # ให้เวลา graceful shutdown (ปิด Chromium + flush WAL)
    networks: [iqc]

  nginx:
    image: nginx:1.27-alpine
    container_name: iqc-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro        # ใส่ fullchain.pem + privkey.pem (ถ้าใช้ TLS ที่ nginx)
      - ./nginx/www:/var/www/certbot:ro          # ACME webroot (Let's Encrypt) — optional
    networks: [iqc]

volumes:
  iqc_uploads:
  iqc_data:

networks:
  iqc:
    driver: bridge
