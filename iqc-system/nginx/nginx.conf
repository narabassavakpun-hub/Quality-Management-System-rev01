# ============================================================================
# IQC System — nginx reverse proxy
# ค่าเริ่มต้น: เสิร์ฟ HTTP :80 → proxy ไป app:3001 (ใช้ได้ทันที / เหมาะกับ Cloudflare หน้าบ้าน)
# เปิด HTTPS ที่ nginx: ใส่ cert ใน ./nginx/certs/ แล้ว uncomment บล็อก "server { listen 443 }"
#                       และเปลี่ยนบล็อก :80 ให้ redirect ไป https
# ============================================================================

worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout 75s;            # ให้ <= server.keepAliveTimeout ของ node (75s)
  server_tokens off;

  client_max_body_size 110m;        # รองรับไฟล์แนบ issue-talk (100MB) + เผื่อ
  client_body_timeout 120s;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css application/javascript application/json
             image/svg+xml application/xml font/woff2;

  # ---- Cloudflare real client IP (uncomment ถ้าอยู่หลัง Cloudflare) ----
  # อัปเดต range จาก https://www.cloudflare.com/ips/
  # set_real_ip_from 173.245.48.0/20;
  # set_real_ip_from 103.21.244.0/22;
  # set_real_ip_from 103.22.200.0/22;
  # set_real_ip_from 104.16.0.0/13;
  # set_real_ip_from 172.64.0.0/13;
  # set_real_ip_from 131.0.72.0/22;
  # real_ip_header CF-Connecting-IP;

  upstream iqc_app {
    server app:3001;
    keepalive 32;
  }

  # บล็อกค่าโพรกซีร่วม (ใช้ซ้ำทั้ง http/https)
  map $http_upgrade $connection_upgrade { default upgrade; '' close; }

  server {
    listen 80;
    server_name _;

    # ACME challenge (Let's Encrypt webroot) — ปล่อยผ่านก่อน redirect
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    # ---- SSE: ต้องปิด buffering + timeout ยาว ----
    location /api/sse {
      proxy_pass http://iqc_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      chunked_transfer_encoding off;
      proxy_read_timeout 3600s;
    }

    # ---- ทุกอย่างอื่น (API + SPA + /uploads) ----
    location / {
      proxy_pass http://iqc_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;      # export PDF/Excel ใช้เวลาได้
    }

    # ไฟล์ static ของ SPA → cache แรง (มี hash ในชื่อไฟล์)
    location /assets/ {
      proxy_pass http://iqc_app;
      proxy_set_header Host $host;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }
  }

  # ===========================================================================
  # HTTPS ที่ nginx (uncomment เมื่อมี cert ใน ./nginx/certs/)
  # แล้วเปลี่ยน location / ในบล็อก :80 ข้างบนเป็น: return 301 https://$host$request_uri;
  # ===========================================================================
  # server {
  #   listen 443 ssl;
  #   http2 on;
  #   server_name your-domain.com;
  #
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ssl_ciphers HIGH:!aNULL:!MD5;
  #   ssl_session_cache shared:SSL:10m;
  #
  #   location /api/sse {
  #     proxy_pass http://iqc_app;
  #     proxy_http_version 1.1;
  #     proxy_set_header Host $host;
  #     proxy_set_header X-Real-IP $remote_addr;
  #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #     proxy_set_header X-Forwarded-Proto $scheme;
  #     proxy_set_header Connection '';
  #     proxy_buffering off; proxy_cache off; chunked_transfer_encoding off;
  #     proxy_read_timeout 3600s;
  #   }
  #   location / {
  #     proxy_pass http://iqc_app;
  #     proxy_http_version 1.1;
  #     proxy_set_header Host $host;
  #     proxy_set_header X-Real-IP $remote_addr;
  #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #     proxy_set_header X-Forwarded-Proto $scheme;
  #     proxy_read_timeout 120s;
  #   }
  # }
}
