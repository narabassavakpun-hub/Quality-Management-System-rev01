name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  server-test:
    name: Server tests (node --test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iqc-system/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: iqc-system/server/package-lock.json
      - run: npm ci
      - run: npm test

  client-build:
    name: Client build (vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iqc-system/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: iqc-system/client/package-lock.json
      - run: npm ci
      - run: npm run build
